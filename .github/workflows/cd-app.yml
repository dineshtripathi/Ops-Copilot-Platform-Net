# -------------------------------------------------------
# OpsCopilot – CD Workflow: App Image Build & Deploy
# -------------------------------------------------------
# Promoted from templates/github-actions/cd-app.yml
#
# Prerequisites (one-time setup — see templates/github-actions/cd-app.yml for full commands)
#
# Secrets (Settings → Secrets and variables → Actions):
#   AZURE_CLIENT_ID              — CD service principal client ID (OIDC)
#                                  (same SP used for platform; mirrors AZURE_CLIENT_ID_PLATFORM
#                                   from deploy-infra.yml — or create a dedicated CD-only SP)
#   AZURE_TENANT_ID              — Azure Entra tenant ID
#   AZURE_SUBSCRIPTION_ID_PLATFORM — platform subscription where Container Apps live
#
# Variables (Settings → Secrets and variables → Actions → Variables):
#   ACR_NAME                     — ACR login server name without .azurecr.io (e.g. acropsctpltfprod)
#   API_FQDN                     — (optional) FQDN of ApiHost for post-deploy smoke test
#                                  e.g. ca-opscopilot-apihost-dev.nicebeach-xyz.uksouth.azurecontainerapps.io
# -------------------------------------------------------

name: OpsCopilot CD — App Images

on:
  # Trigger automatically after CI succeeds on main
  workflow_run:
    workflows: ["CI — Build, Conformance & Test"]
    types: [completed]
    branches: [main]
  # Allow manual deploys to any environment
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        default: dev
        type: choice
        options: [dev, sandbox, prod]

permissions:
  id-token: write   # required for OIDC token exchange
  contents: read

jobs:
  build-push-deploy:
    name: Build · Push · Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    # Skip if triggered by a failed CI run
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    env:
      IMAGE_TAG: ${{ github.sha }}
      TARGET_ENV: ${{ inputs.environment || 'dev' }}
      ACR_NAME: ${{ vars.ACR_NAME }}

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Azure OIDC login ───────────────────────────────────────
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID_PLATFORM }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PLATFORM }}

      # ── Authenticate Docker to ACR ─────────────────────────────
      - name: ACR Login
        run: az acr login --name ${{ env.ACR_NAME }}

      # ── Set up Docker Buildx (multi-platform support) ──────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build & Push: ApiHost ──────────────────────────────────
      - name: Build & Push ApiHost
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Hosts/OpsCopilot.ApiHost/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha,scope=apihost
          cache-to:   type=gha,mode=max,scope=apihost
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/opscopilot/apihost:${{ env.IMAGE_TAG }}
            ${{ env.ACR_NAME }}.azurecr.io/opscopilot/apihost:latest

      # ── Build & Push: McpHost ──────────────────────────────────
      - name: Build & Push McpHost
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Hosts/OpsCopilot.McpHost/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha,scope=mcphost
          cache-to:   type=gha,mode=max,scope=mcphost
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/opscopilot/mcphost:${{ env.IMAGE_TAG }}
            ${{ env.ACR_NAME }}.azurecr.io/opscopilot/mcphost:latest

      # ── Build & Push: WorkerHost ───────────────────────────────
      - name: Build & Push WorkerHost
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Hosts/OpsCopilot.WorkerHost/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha,scope=workerhost
          cache-to:   type=gha,mode=max,scope=workerhost
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/opscopilot/workerhost:${{ env.IMAGE_TAG }}
            ${{ env.ACR_NAME }}.azurecr.io/opscopilot/workerhost:latest

      # Re-authenticate: Docker builds can take 15+ minutes, expiring the original
      # 5-minute OIDC assertion before the Container Apps deployment steps run.
      - name: Azure Re-Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID_PLATFORM }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_PLATFORM }}

      # ── Attach ACR to Container Apps (idempotent, RBAC already in place from infra) ──
      # 'az containerapp registry set --identity system' is in the containerapp extension
      # but the pinned version on ubuntu-latest runners may be older — upgrade first.
      - name: Upgrade Container Apps CLI extension
        run: az extension add --name containerapp --upgrade --yes

      - name: Configure ACR registry on Container Apps
        run: |
          RG="rg-opscopilot-platform-${{ env.TARGET_ENV }}-uks"
          for APP in \
            "ca-opscopilot-apihost-${{ env.TARGET_ENV }}" \
            "ca-opscopilot-mcphost-${{ env.TARGET_ENV }}" \
            "ca-opscopilot-workerhost-${{ env.TARGET_ENV }}"; do
            for attempt in 1 2 3; do
              if az containerapp registry set \
                  --name "$APP" \
                  --resource-group "$RG" \
                  --server "${{ env.ACR_NAME }}.azurecr.io" \
                  --identity system 2>&1; then
                break
              fi
              if [ "$attempt" -lt 3 ]; then
                echo "Attempt $attempt failed for $APP (may be ContainerAppOperationInProgress). Retrying in 30s..."
                sleep 30
              else
                echo "All attempts failed for $APP — failing step."
                exit 1
              fi
            done
          done

      # ── Deploy to Container Apps ───────────────────────────────
      - name: Deploy ApiHost
        run: |
          az containerapp update \
            --name "ca-opscopilot-apihost-${{ env.TARGET_ENV }}" \
            --resource-group "rg-opscopilot-platform-${{ env.TARGET_ENV }}-uks" \
            --image "${{ env.ACR_NAME }}.azurecr.io/opscopilot/apihost:${{ env.IMAGE_TAG }}"

      - name: Deploy McpHost
        run: |
          az containerapp update \
            --name "ca-opscopilot-mcphost-${{ env.TARGET_ENV }}" \
            --resource-group "rg-opscopilot-platform-${{ env.TARGET_ENV }}-uks" \
            --image "${{ env.ACR_NAME }}.azurecr.io/opscopilot/mcphost:${{ env.IMAGE_TAG }}"

      - name: Deploy WorkerHost
        run: |
          az containerapp update \
            --name "ca-opscopilot-workerhost-${{ env.TARGET_ENV }}" \
            --resource-group "rg-opscopilot-platform-${{ env.TARGET_ENV }}-uks" \
            --image "${{ env.ACR_NAME }}.azurecr.io/opscopilot/workerhost:${{ env.IMAGE_TAG }}"

      # ── Smoke test post-deploy ─────────────────────────────────
      - name: Smoke Test
        shell: pwsh
        env:
          API_FQDN: ${{ vars.API_FQDN }}
        run: |
          if ($env:API_FQDN) {
            scripts/Invoke-SmokeTest.ps1 -BaseUrl "https://$env:API_FQDN"
          } else {
            Write-Host "API_FQDN variable not set — skipping smoke test"
          }
