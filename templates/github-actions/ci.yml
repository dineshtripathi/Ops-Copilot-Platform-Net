# -------------------------------------------------------
# OpsCopilot – CI Workflow Template
# -------------------------------------------------------
# Copy this file to .github/workflows/ci.yml in your fork
# and adjust the parameters below.
#
# This template is NOT an active workflow — it lives in
# templates/github-actions/ on purpose.
# -------------------------------------------------------

name: OpsCopilot CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'         # <PLACEHOLDER> — match your global.json

      - name: Restore
        run: dotnet restore OpsCopilot.sln

      - name: Build
        run: dotnet build OpsCopilot.sln --no-restore --configuration Release

      - name: Test
        env:
          # GitHub PAT with model-inference access — stored as a repo/env secret.
          # Maps to AI:GitHubModels:Token so the LLM path is active in integration tests.
          # Secret name: AI_TOKEN  (Settings → Secrets and variables → Actions → New secret)
          AI__GitHubModels__Token: ${{ secrets.AI_TOKEN }}
        run: dotnet test OpsCopilot.sln --no-build --configuration Release --verbosity normal
